<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Customer Analytics Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            background:white;
            border-radius:15px;
            padding:40px;
            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
        }

        .login-title{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .logo{
            text-align:center;
            font-size:50px;
            margin-bottom:10px;
        }

        .btn-login{
            width:100%;
            padding:12px;
            font-size:18px;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:gray;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        🤖
    </div>

    <h2 class="login-title">
        AI Customer Analytics Platform
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary btn-login">

            Login

        </button>

    </form>

    <div class="footer-text">

        Customer Intelligence • Segmentation • Churn Analysis • Recommendations

    </div>

</div>

</body>
</html>
